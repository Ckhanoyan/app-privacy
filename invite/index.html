<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join Marketpals</title>
  <style>
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #FAF7F2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { text-align: center; padding: 40px 32px; max-width: 360px; }
    .logo { font-size: 32px; font-weight: 700; color: #1C1917; margin-bottom: 8px; }
    .accent { color: #C4622D; }
    .sub { font-size: 16px; color: #6B6560; margin-bottom: 32px; line-height: 1.5; }
    .btn { display: inline-block; background: #1C1917; color: white; font-size: 16px; font-weight: 700; padding: 16px 32px; border-radius: 14px; text-decoration: none; margin-bottom: 16px; }
    .alt { font-size: 13px; color: #9E9189; }
    .alt a { color: #C4622D; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">market<span class="accent">pals</span></div>
    <p class="sub">Your friend invited you to Marketpals — a marketplace just for friends. No strangers, no spam.</p>
    <a class="btn" href="https://apps.apple.com/app/marketpals/id6769597862">Download on the App Store</a>
    <p class="alt">Already have it? Open the app and add your friend by username.</p>
  </div>
</body>
</html>
